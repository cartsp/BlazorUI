name: Build & Test

on:
  push:
    branches:
      - '**'
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js (for Tailwind CSS)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tailwind CSS (AppHost)
        run: npx @tailwindcss/cli -i src/AppHost/wwwroot/css/app.css -o src/AppHost/wwwroot/css/output.css --minify

      - name: Build Tailwind CSS (Demo Wasm)
        run: npx @tailwindcss/cli -i src/BlazorEffects.Demo.Wasm/wwwroot/css/app.css -o src/BlazorEffects.Demo.Wasm/wwwroot/css/output.css --minify

      - name: Restore dependencies
        run: dotnet restore BlazorUI.slnx

      - name: Build
        run: dotnet build BlazorUI.slnx --configuration Release --no-restore

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js (for Tailwind CSS)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tailwind CSS (AppHost)
        run: npx @tailwindcss/cli -i src/AppHost/wwwroot/css/app.css -o src/AppHost/wwwroot/css/output.css --minify

      - name: Build Tailwind CSS (Demo Wasm)
        run: npx @tailwindcss/cli -i src/BlazorEffects.Demo.Wasm/wwwroot/css/app.css -o src/BlazorEffects.Demo.Wasm/wwwroot/css/output.css --minify

      - name: Restore dependencies
        run: dotnet restore BlazorUI.slnx

      - name: Build
        run: dotnet build BlazorUI.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test BlazorUI.slnx --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/test-results.trx'
          retention-days: 7

  format:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore BlazorUI.slnx

      - name: Check formatting
        run: dotnet format BlazorUI.slnx --verify-no-changes --no-restore
