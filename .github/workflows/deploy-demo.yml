name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/BlazorEffects.*/**'
      - 'src/Presentation/**'
      - 'src/Domain/**'
      - 'src/Application/**'
      - 'src/Infrastructure/**'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js (for Tailwind CSS)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Tailwind CSS
        run: npm ci

      - name: Build Tailwind CSS for demo
        run: npx @tailwindcss/cli -i src/BlazorEffects.Demo.Wasm/wwwroot/css/app.css -o src/BlazorEffects.Demo.Wasm/wwwroot/css/output.css --minify

      - name: Publish BlazorEffects Demo
        run: dotnet publish src/BlazorEffects.Demo.Wasm/BlazorEffects.Demo.Wasm.csproj -c Release -o publish-output

      - name: Add .nojekyll
        run: touch publish-output/wwwroot/.nojekyll

      - name: Fix base path for GitHub Pages
        shell: pwsh
        run: |
          # GitHub Pages serves from /BlazorUI/ when using project pages
          # For custom domain or user pages, this would be "/"
          $indexPath = "publish-output/wwwroot/index.html"
          $content = Get-Content $indexPath -Raw
          $content = $content -replace '<base href="/"', '<base href="/BlazorUI/"'
          Set-Content $indexPath $content

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish-output/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
