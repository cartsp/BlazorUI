name: NuGet Pack

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: pack-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js (for Tailwind CSS)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tailwind CSS (Demo Wasm)
        run: npx @tailwindcss/cli -i src/BlazorEffects.Demo.Wasm/wwwroot/css/app.css -o src/BlazorEffects.Demo.Wasm/wwwroot/css/output.css --minify

      - name: Restore dependencies
        run: dotnet restore BlazorUI.slnx

      - name: Build
        run: dotnet build BlazorUI.slnx --configuration Release --no-restore

      - name: Pack NuGet packages
        run: dotnet pack BlazorUI.slnx --configuration Release --no-build --output ./artifacts

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg
          retention-days: 30
