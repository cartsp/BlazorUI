<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <filter id="aurora-blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="aurora-blur-heavy">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
    <linearGradient id="aurora-green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ff87" stop-opacity="0"/>
      <stop offset="20%" stop-color="#00ff87" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#00ff87" stop-opacity="0.7"/>
      <stop offset="80%" stop-color="#00ff87" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00ff87" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aurora-purple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7b2ff7" stop-opacity="0"/>
      <stop offset="25%" stop-color="#7b2ff7" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#7b2ff7" stop-opacity="0.6"/>
      <stop offset="75%" stop-color="#7b2ff7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7b2ff7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aurora-cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00b4d8" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00b4d8" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#00b4d8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00b4d8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aurora-pink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c026d3" stop-opacity="0"/>
      <stop offset="20%" stop-color="#c026d3" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#c026d3" stop-opacity="0.35"/>
      <stop offset="80%" stop-color="#c026d3" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#c026d3" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="450" fill="#000000"/>
  
  <!-- Sky gradient -->
  <rect width="800" height="450" fill="url(#sky)" opacity="0.3"/>
  
  <!-- Aurora ribbon 1 - Green (dominant, top) -->
  <path d="M-50,120 C50,80 150,140 250,100 C350,60 400,130 500,90 C600,50 700,110 850,80 L850,200 C700,180 600,160 500,190 C400,210 300,170 200,200 C100,220 0,180 -50,190 Z" 
        fill="url(#aurora-green)" filter="url(#aurora-blur)" opacity="0.7"/>
  
  <!-- Aurora ribbon 2 - Purple (middle) -->
  <path d="M-50,160 C100,120 180,200 300,150 C420,100 480,180 600,140 C720,100 780,170 850,130 L850,250 C780,220 700,200 600,240 C500,270 400,210 300,250 C200,280 100,230 -50,240 Z"
        fill="url(#aurora-purple)" filter="url(#aurora-blur)" opacity="0.6"/>
  
  <!-- Aurora ribbon 3 - Cyan -->
  <path d="M-50,200 C80,170 200,230 320,180 C440,130 520,220 650,180 C750,150 800,210 850,180 L850,280 C800,250 720,240 650,270 C540,310 440,260 320,290 C200,320 100,270 -50,290 Z"
        fill="url(#aurora-cyan)" filter="url(#aurora-blur)" opacity="0.5"/>
  
  <!-- Aurora ribbon 4 - Pink (subtle, bottom) -->
  <path d="M-50,250 C100,220 180,280 300,240 C420,200 500,270 620,230 C740,190 800,260 850,230 L850,320 C800,300 720,290 620,320 C500,350 400,310 300,330 C200,350 100,310 -50,320 Z"
        fill="url(#aurora-pink)" filter="url(#aurora-blur)" opacity="0.4"/>
  
  <!-- Bright aurora glow (heavy blur for atmospheric effect) -->
  <path d="M0,100 C100,60 200,130 350,80 C500,30 600,120 800,70 L800,180 C600,160 500,200 350,170 C200,200 100,160 0,180 Z"
        fill="#00ff87" filter="url(#aurora-blur-heavy)" opacity="0.25"/>
  <path d="M0,150 C150,110 250,190 400,130 C550,70 650,160 800,120 L800,230 C650,210 550,250 400,210 C250,260 150,210 0,230 Z"
        fill="#7b2ff7" filter="url(#aurora-blur-heavy)" opacity="0.2"/>
  
  <!-- Star field background -->
  <g fill="white" opacity="0.6">
    <circle cx="50" cy="30" r="1"/>
    <circle cx="150" cy="50" r="0.8"/>
    <circle cx="250" cy="20" r="1.2"/>
    <circle cx="350" cy="40" r="0.7"/>
    <circle cx="450" cy="25" r="1"/>
    <circle cx="550" cy="45" r="0.8"/>
    <circle cx="650" cy="15" r="1.1"/>
    <circle cx="750" cy="35" r="0.9"/>
    <circle cx="100" cy="380" r="0.8"/>
    <circle cx="200" cy="400" r="1"/>
    <circle cx="400" cy="390" r="0.7"/>
    <circle cx="600" cy="410" r="0.9"/>
    <circle cx="700" cy="380" r="0.8"/>
    <circle cx="300" cy="420" r="0.6"/>
    <circle cx="500" cy="430" r="0.8"/>
    <circle cx="780" cy="120" r="0.5"/>
    <circle cx="20" cy="250" r="0.7"/>
    <circle cx="770" cy="300" r="0.6"/>
  </g>
</svg>