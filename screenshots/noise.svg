<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="noise-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="25%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="75%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="noise-turbulence">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="4" seed="42" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feComponentTransfer in="grayNoise" result="coloredNoise">
        <feFuncR type="table" tableValues="0.06 0.39 0.66 0.93 0.06"/>
        <feFuncG type="table" tableValues="0.09 0.40 0.33 0.28 0.09"/>
        <feFuncB type="table" tableValues="0.16 0.95 0.97 0.60 0.16"/>
      </feComponentTransfer>
      <feComponentTransfer in="coloredNoise" result="brightNoise">
        <feFuncR type="linear" slope="1.2" intercept="0"/>
        <feFuncG type="linear" slope="1.0" intercept="0"/>
        <feFuncB type="linear" slope="1.1" intercept="0"/>
      </feComponentTransfer>
    </filter>
    <filter id="noise-smooth">
      <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="3" seed="17" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feComponentTransfer in="grayNoise" result="coloredNoise">
        <feFuncR type="table" tableValues="0.06 0.39 0.66 0.93 0.06"/>
        <feFuncG type="table" tableValues="0.09 0.40 0.33 0.28 0.09"/>
        <feFuncB type="table" tableValues="0.16 0.95 0.97 0.60 0.16"/>
      </feComponentTransfer>
    </filter>
  </defs>
  
  <!-- Base noise texture -->
  <rect width="800" height="450" filter="url(#noise-turbulence)"/>
  
  <!-- Additional smooth layer for depth -->
  <rect width="800" height="450" filter="url(#noise-smooth)" opacity="0.3"/>
  
  <!-- Subtle vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="black" stop-opacity="0"/>
    <stop offset="100%" stop-color="black" stop-opacity="0.4"/>
  </radialGradient>
  <rect width="800" height="450" fill="url(#vignette)"/>
</svg>